<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontora24 — Нет соединения</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #f8f9fa;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: #e94560;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; color: white; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01"/>
      </svg>
    </div>
    <h1>Нет соединения</h1>
    <p>Проверьте интернет-соединение и попробуйте снова. Если вы используете МТС — попробуйте включить VPN.</p>
    <button onclick="location.reload()">Повторить</button>
  </div>
</body>
</html>
